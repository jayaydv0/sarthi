<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ArchitectOS | Secure Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {

            theme: {
                extend: {
                    "colors": {
                        "background": "#081425",
                        "outline": "#908fa0",
                        "on-background": "#d8e3fb",
                        "on-primary-fixed": "#07006c",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "surface-container-highest": "#2a3548",
                        "on-tertiary-fixed-variant": "#5a4300",
                        "on-error-container": "#ffdad6",

                        "surface-bright": "#2f3a4c",

                        "inverse-surface": "#d8e3fb",

                        "inverse-primary": "#494bd6",

                        "surface-container-lowest": "#040e1f",

                        "secondary": "#4ae176",
                        "tertiary-container": "#b68a00",
                        "on-secondary": "#003915",
                        "error-container": "#93000a",

                    "borderRadius": {

                        "xl": "3rem",

                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]

<style>
        body {
            background-color: #081425;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(42, 53, 72, 0.4);
            backdrop-filter: blur(24px);
            border-top: 1px solid rgba(225, 224, 255, 0.1);
        }
        .auth-input:focus {
            box-shadow: 0 0 0 2px rgba(192, 193, 255, 0.3);
        }
        .ambient-glow {
            background: radial-gradient(circle at 50% 50%, rgba(128, 131, 255, 0.15) 0%, transparent 70%);
        }
    </style>
</head>
<body class="antialiased text-on-surface flex items-center justify-center min-h-screen overflow-hidden">
<!-- Ambient Background Decoration -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] ambient-glow rounded-full"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[60%] h-[60%] ambient-glow rounded-full"></div>
</div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-md px-6 py-12">
<!-- Header / Brand Section -->
<div class="text-center mb-12">
<h1 class="text-3xl font-black tracking-tighter bg-gradient-to-br from-[#c0c1ff] to-[#8083ff] bg-clip-text text-transparent mb-2">
                ArchitectOS
            </h1>
<p class="text-sm font-medium tracking-wide text-outline uppercase">Development Environment</p>
</div>
<!-- Login Card -->
<div class="glass-panel rounded-xl p-8 shadow-[0_20px_40px_rgba(8,20,37,0.6)]">
<!-- Welcome Text -->
<div class="mb-8">
<h2 class="text-2xl font-bold text-on-surface tracking-tight">Welcome back</h2>
<p class="text-on-surface-variant text-sm mt-1">Please enter your details to continue.</p>
</div>
<!-- Auth Form -->
<form action="#" class="space-y-5" method="POST">
<div>
<label class="block text-[0.6875rem] font-bold tracking-[0.05em] text-outline uppercase mb-2 ml-1" for="email">Email Address</label>
<input class="auth-input w-full bg-surface-container-lowest text-on-surface border-none rounded-DEFAULT px-4 py-3.5 placeholder:text-surface-container-highest transition-all duration-200 outline-none" id="email" name="email" placeholder="dev@architectos.io" required="" type="email"/>
</div>
<div>
<div class="flex justify-between items-center mb-2 ml-1">
<label class="block text-[0.6875rem] font-bold tracking-[0.05em] text-outline uppercase" for="password">Password</label>
<a class="text-[0.6875rem] font-bold text-primary hover:text-primary-container transition-colors duration-200 uppercase tracking-[0.05em]" href="#">Forgot?</a>
</div>
<input class="auth-input w-full bg-surface-container-lowest text-on-surface border-none rounded-DEFAULT px-4 py-3.5 placeholder:text-surface-container-highest transition-all duration-200 outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold py-4 rounded-full active:scale-[0.98] transition-transform duration-200 shadow-lg shadow-primary/20" type="submit">
                    Login
                </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-white/5"></div>
</div>
<div class="relative flex justify-center text-[0.6875rem] uppercase tracking-widest">
<span class="bg-surface-variant/40 px-3 text-outline">Or continue with</span>
</div>
</div>
<!-- OAuth Actions -->
<div class="grid grid-cols-1 gap-3">
<button class="flex items-center justify-center gap-3 w-full bg-surface-container-highest/50 hover:bg-surface-container-highest text-on-surface border border-white/5 py-3.5 rounded-full transition-all duration-300 group">
<img alt="Google" class="w-5 h-5 opacity-80 group-hover:opacity-100" data-alt="Google logo icon in multi-color stylized brand design with soft edges" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCGmMUv6l-xrb2MOCIiu3i6FmuuZDm4hVDseCZZlf27iIBKLzGNNXT6RD-LD5Ag5uzGaZHrYjVzkrnpyHnz84BQzPaKJ6ADLCXfP59KcZzjPUMH0ZaUW5EcyNyIi2QDF6mmcmmj0BKDcxCd7XOLwGfqciAxPGTR3RdehAxkhXo5UoH1UDPktrT0CJx3alFW9P5QDu2jEevC8XblmtCwhwQ7FGgJJY33wV6Ost8KBBPu7COr3AkO7Ddc0eIL065Zx4ZPJQUbKFjYLaI"/>
<span class="text-sm font-semibold">Continue with Google</span>
</button>
<button class="flex items-center justify-center gap-3 w-full bg-surface-container-highest/50 hover:bg-surface-container-highest text-on-surface border border-white/5 py-3.5 rounded-full transition-all duration-300 group">
<span class="material-symbols-outlined text-[20px] opacity-80 group-hover:opacity-100" data-icon="terminal">terminal</span>
<span class="text-sm font-semibold">Continue with GitHub</span>
</button>
</div>
</div>
<!-- Footer Link -->
<div class="text-center mt-8">
<p class="text-sm text-on-surface-variant">
                Don’t have an account? 
                <a class="text-primary font-bold ml-1 hover:underline transition-all" href="#">Sign up</a>
</p>
</div>
<!-- System Status Indicator (Editorial Element) -->
<div class="fixed bottom-8 left-0 right-0 flex justify-center pointer-events-none">
<div class="bg-surface-container-low/80 backdrop-blur-md px-4 py-2 rounded-full border border-white/5 flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-secondary animate-pulse"></div>
<span class="text-[10px] font-bold tracking-[0.1em] text-outline uppercase">ArchitectOS Systems Operational</span>
</div>
</div>
</main>
<!-- Decorative Corner Visuals -->
<div class="fixed top-0 right-0 p-12 hidden lg:block opacity-20">
<div class="w-32 h-32 border-r border-t border-primary/30 rounded-tr-xl"></div>
</div>
<div class="fixed bottom-0 left-0 p-12 hidden lg:block opacity-20">
<div class="w-32 h-32 border-l border-b border-primary/30 rounded-bl-xl"></div>
</div>
</body></html>
